spring:
  profiles:
    active: dev

---
# ── 개발 환경 (H2 인메모리) ──────────────────────────────
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:linkitdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      encoding: UTF-8
      data-locations: classpath:data.sql

server:
  port: 8080

jwt:
  secret: linkit-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration: 86400000   # 24시간 (ms)

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

app:
  cors:
    # 개발: 로컬 Next.js + GitHub Pages 미리보기
    allowed-origins: "http://localhost:3000,https://k7788.github.io"
  upload:
    dir: uploads

---
# ── 운영 환경 (MySQL) ────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:linkitdb}?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:linkit}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  upload:
    dir: ${UPLOAD_DIR:uploads}
